name: Koki AI Hub CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.9'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: koki-ai/hub

jobs:
  # 코드 품질 검사
  code-quality:
    name: 코드 품질 검사
    runs-on: ubuntu-latest
    
    steps:
    - name: 체크아웃
      uses: actions/checkout@v4
      
    - name: Node.js 설정
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: api-proxy/package-lock.json
        
    - name: Python 설정
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: 의존성 설치
      run: |
        cd api-proxy
        npm ci
        cd ..
        pip install flake8 black pylint
        
    - name: JavaScript Linting
      run: |
        cd api-proxy
        npm run lint
        
    - name: Python Linting
      run: |
        flake8 --max-line-length=88 --extend-ignore=E203,W503 .
        black --check .
        
    - name: 보안 취약점 스캔
      run: |
        cd api-proxy
        npm audit --audit-level=high
        
    - name: 코드 복잡도 검사
      run: |
        cd api-proxy
        npx complexity-report --format json src/ > complexity-report.json
        
    - name: 코드 커버리지 업로드
      uses: actions/upload-artifact@v3
      with:
        name: code-quality-reports
        path: |
          api-proxy/coverage/
          complexity-report.json

  # 단위 테스트
  unit-tests:
    name: 단위 테스트
    runs-on: ubuntu-latest
    needs: code-quality
    
    strategy:
      matrix:
        node-version: [16, 18, 20]
        
    steps:
    - name: 체크아웃
      uses: actions/checkout@v4
      
    - name: Node.js ${{ matrix.node-version }} 설정
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: api-proxy/package-lock.json
        
    - name: 의존성 설치
      run: |
        cd api-proxy
        npm ci
        
    - name: 단위 테스트 실행
      run: |
        cd api-proxy
        npm test -- --coverage --watchAll=false
        
    - name: 테스트 결과 업로드
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-node-${{ matrix.node-version }}
        path: |
          api-proxy/coverage/
          api-proxy/test-results.xml

  # 통합 테스트
  integration-tests:
    name: 통합 테스트
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
    - name: 체크아웃
      uses: actions/checkout@v4
      
    - name: Node.js 설정
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: api-proxy/package-lock.json
        
    - name: 의존성 설치
      run: |
        cd api-proxy
        npm ci
        
    - name: 환경 설정
      run: |
        cp .env.example .env.test
        echo "REDIS_HOST=localhost" >> .env.test
        echo "REDIS_PORT=6379" >> .env.test
        echo "NODE_ENV=test" >> .env.test
        
    - name: 통합 테스트 실행
      run: |
        cd api-proxy
        npm run test:integration
      env:
        NODE_ENV: test
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        
    - name: E2E 테스트 준비
      run: |
        # 테스트 서버 시작
        cd api-proxy
        npm start &
        sleep 10
        
    - name: E2E 테스트 실행
      run: |
        cd api-proxy
        npm run test:e2e
        
    - name: 성능 테스트
      run: |
        cd api-proxy
        npm run test:performance

  # 보안 테스트
  security-tests:
    name: 보안 테스트
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
    - name: 체크아웃
      uses: actions/checkout@v4
      
    - name: CodeQL 초기화
      uses: github/codeql-action/init@v2
      with:
        languages: javascript
        
    - name: CodeQL 분석
      uses: github/codeql-action/analyze@v2
      
    - name: Snyk 보안 테스트
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
        
    - name: OWASP ZAP 스캔
      uses: zaproxy/action-baseline@v0.7.0
      with:
        target: 'http://localhost:3001'

  # 도커 이미지 빌드
  docker-build:
    name: Docker 이미지 빌드
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
      
    steps:
    - name: 체크아웃
      uses: actions/checkout@v4
      
    - name: Docker Buildx 설정
      uses: docker/setup-buildx-action@v3
      
    - name: 레지스트리 로그인
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 메타데이터 추출
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: 이미지 빌드 및 푸시
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: 이미지 취약점 스캔
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: 스캔 결과 업로드
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # 배포 준비
  deploy-staging:
    name: 스테이징 배포
    runs-on: ubuntu-latest
    needs: [docker-build, security-tests]
    if: github.ref == 'refs/heads/develop'
    
    environment:
      name: staging
      url: https://staging.koki-ai.com
      
    steps:
    - name: 체크아웃
      uses: actions/checkout@v4
      
    - name: Azure CLI 설정
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: 스테이징 배포
      run: |
        # Azure Container Instances에 배포
        az container create \
          --resource-group koki-staging \
          --name koki-ai-hub-staging \
          --image ${{ needs.docker-build.outputs.image-tag }} \
          --cpu 1 --memory 2 \
          --ports 3001 \
          --environment-variables \
            NODE_ENV=staging \
            PORT=3001 \
          --secure-environment-variables \
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY_STAGING }} \
            REDIS_URL=${{ secrets.REDIS_URL_STAGING }}
            
    - name: 스테이징 헬스체크
      run: |
        for i in {1..30}; do
          if curl -f https://staging.koki-ai.com/health; then
            echo "스테이징 배포 성공!"
            exit 0
          fi
          echo "헬스체크 대기 중... ($i/30)"
          sleep 10
        done
        echo "스테이징 배포 실패!"
        exit 1
        
    - name: 스테이징 테스트 실행
      run: |
        cd api-proxy
        npm run test:staging
      env:
        STAGING_URL: https://staging.koki-ai.com

  # 프로덕션 배포
  deploy-production:
    name: 프로덕션 배포
    runs-on: ubuntu-latest
    needs: [docker-build, security-tests]
    if: github.event_name == 'release'
    
    environment:
      name: production
      url: https://koki-ai.com
      
    steps:
    - name: 체크아웃
      uses: actions/checkout@v4
      
    - name: AWS CLI 설정
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: ECS 태스크 정의 업데이트
      run: |
        # ECS 태스크 정의 업데이트
        aws ecs update-service \
          --cluster koki-production \
          --service koki-ai-hub \
          --force-new-deployment
          
    - name: 블루/그린 배포
      run: |
        # AWS CodeDeploy를 통한 블루/그린 배포
        aws deploy create-deployment \
          --application-name koki-ai-hub \
          --deployment-group-name production \
          --s3-location bucket=koki-deployments,key=latest.zip,bundleType=zip
          
    - name: 프로덕션 헬스체크
      run: |
        for i in {1..60}; do
          if curl -f https://koki-ai.com/health; then
            echo "프로덕션 배포 성공!"
            exit 0
          fi
          echo "헬스체크 대기 중... ($i/60)"
          sleep 10
        done
        echo "프로덕션 배포 실패!"
        exit 1
        
    - name: 스모크 테스트
      run: |
        cd api-proxy
        npm run test:smoke
      env:
        PRODUCTION_URL: https://koki-ai.com
        
    - name: 성능 테스트
      run: |
        cd api-proxy
        npm run test:performance:production

  # 배포 후 검증
  post-deploy-verification:
    name: 배포 후 검증
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.event_name == 'release'
    
    steps:
    - name: 체크아웃
      uses: actions/checkout@v4
      
    - name: 종합 헬스체크
      run: |
        # 모든 엔드포인트 테스트
        curl -f https://koki-ai.com/health
        curl -f https://koki-ai.com/api/health
        curl -f https://koki-ai.com/metrics
        
    - name: 성능 벤치마크
      run: |
        # Artillery를 사용한 부하 테스트
        npm install -g artillery
        artillery run tests/performance/production-load-test.yml
        
    - name: 가용성 모니터링 설정
      run: |
        # 업타임 모니터링 설정
        curl -X POST \
          -H "Authorization: Bearer ${{ secrets.UPTIMEROBOT_API_KEY }}" \
          -d "api_key=${{ secrets.UPTIMEROBOT_API_KEY }}" \
          -d "format=json" \
          -d "type=1" \
          -d "url=https://koki-ai.com" \
          -d "friendly_name=Koki AI Hub Production" \
          https://api.uptimerobot.com/v2/newMonitor
          
    - name: 배포 알림
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        text: |
          🚀 Koki AI Hub v${{ github.event.release.tag_name }} 프로덕션 배포 완료!
          📍 URL: https://koki-ai.com
          🏷️ 버전: ${{ github.event.release.tag_name }}
          👤 배포자: ${{ github.actor }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # 롤백 준비
  prepare-rollback:
    name: 롤백 준비
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure()
    
    steps:
    - name: 이전 버전으로 롤백
      run: |
        # ECS 서비스를 이전 태스크 정의로 롤백
        aws ecs update-service \
          --cluster koki-production \
          --service koki-ai-hub \
          --task-definition koki-ai-hub:PREVIOUS
          
    - name: 롤백 알림
      uses: 8398a7/action-slack@v3
      with:
        status: 'warning'
        channel: '#deployments'
        text: |
          ⚠️ 배포 실패로 인한 자동 롤백 실행
          🔄 이전 버전으로 복구 중...
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # 리포트 생성
  generate-reports:
    name: 리포트 생성
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests, docker-build]
    if: always()
    
    steps:
    - name: 체크아웃
      uses: actions/checkout@v4
      
    - name: 아티팩트 다운로드
      uses: actions/download-artifact@v3
      
    - name: 통합 리포트 생성
      run: |
        # 테스트 및 품질 리포트 통합
        python scripts/generate_ci_report.py
        
    - name: 리포트 업로드
      uses: actions/upload-artifact@v3
      with:
        name: ci-cd-report
        path: reports/
        
    - name: Pages 배포 (리포트)
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./reports
        destination_dir: ci-reports

# 워크플로우 알림
on_failure:
  runs-on: ubuntu-latest
  needs: [code-quality, unit-tests, integration-tests, security-tests, docker-build]
  if: failure()
  
  steps:
  - name: 실패 알림
    uses: 8398a7/action-slack@v3
    with:
      status: 'failure'
      channel: '#ci-cd'
      text: |
        ❌ CI/CD 파이프라인 실행 실패
        🔗 워크플로우: ${{ github.workflow }}
        📝 커밋: ${{ github.sha }}
        👤 작성자: ${{ github.actor }}
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
