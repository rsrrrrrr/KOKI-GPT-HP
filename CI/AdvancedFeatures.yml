    showModal(title, content) {
        // 기존 모달 제거
        const existingModal = document.getElementById('advanced-modal');
        if (existingModal) existingModal.remove();
        
        const modal = document.createElement('div');
        modal.id = 'advanced-modal';
        modal.innerHTML = `
            <div class="modal-overlay" onclick="this.parentElement.remove()">
                <div class="modal-content" onclick="event.stopPropagation()">
                    <div class="modal-header">
                        <h2>${title}</h2>
                        <button class="modal-close" onclick="this.closest('.modal-overlay').parentElement.remove()">×</button>
                    </div>
                    <div class="modal-body">
                        ${content}
                    </div>
                </div>
            </div>
            <style>
                .modal-overlay {
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0,0,0,0.8);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    z-index: 10000;
                    backdrop-filter: blur(10px);
                }
                .modal-content {
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    border-radius: 20px;
                    max-width: 90vw;
                    max-height: 90vh;
                    overflow: hidden;
                    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
                    color: white;
                }
                .modal-header {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    padding: 20px 25px;
                    border-bottom: 1px solid rgba(255,255,255,0.2);
                }
                .modal-header h2 {
                    margin: 0;
                    font-size: 1.4rem;
                }
                .modal-close {
                    background: none;
                    border: none;
                    color: white;
                    font-size: 24px;
                    cursor: pointer;
                    padding: 0;
                    width: 30px;
                    height: 30px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    border-radius: 50%;
                    transition: background 0.2s;
                }
                .modal-close:hover {
                    background: rgba(255,255,255,0.2);
                }
                .modal-body {
                    padding: 25px;
                    max-height: 70vh;
                    overflow-y: auto;
                }
            </style>
        `;
        
        document.body.appendChild(modal);
        
        // ESC 키로 모달 닫기
        const closeOnEsc = (e) => {
            if (e.key === 'Escape') {
                modal.remove();
                document.removeEventListener('keydown', closeOnEsc);
            }
        };
        document.addEventListener('keydown', closeOnEsc);
    }
    
    exportDebugData() {
        const debugData = {
            timestamp: new Date().toISOString(),
            version: this.app.version,
            userAgent: navigator.userAgent,
            settings: this.app.settings,
            performance: this.performance.getReport(),
            analytics: this.analytics.getReport(),
            chatHistory: this.app.chatHistory.slice(-10), // 최근 10개만
            apiStatus: {
                claude: window.claudeAPI?.isConnected || false,
                gpt4: window.gpt4API?.isConnected || false
            },
            errors: this.analytics.getRecentErrors()
        };
        
        this.downloadJSON(debugData, `koki-debug-${Date.now()}.json`);
        this.app.showNotification('🔧 디버그 데이터 다운로드 완료');
    }
    
    downloadJSON(data, filename) {
        const blob = new Blob([JSON.stringify(data, null, 2)], {
            type: 'application/json'
        });
        
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    
    async testAllFeatures() {
        const tests = [
            { name: 'API 연결', test: () => this.testApiConnection() },
            { name: '음성 인식', test: () => this.testSpeechRecognition() },
            { name: '로컬 저장소', test: () => this.testLocalStorage() },
            { name: '서비스 워커', test: () => this.testServiceWorker() },
            { name: '카메라 접근', test: () => this.testCameraAccess() }
        ];
        
        const results = [];
        
        for (const test of tests) {
            try {
                const result = await test.test();
                results.push({ name: test.name, status: 'success', result });
                console.log(`✅ ${test.name}: 통과`);
            } catch (error) {
                results.push({ name: test.name, status: 'error', error: error.message });
                console.error(`❌ ${test.name}: ${error.message}`);
            }
        }
        
        this.showTestResults(results);
    }
    
    showTestResults(results) {
        const content = `
            <div class="test-results">
                <h3>기능 테스트 결과</h3>
                ${results.map(result => `
                    <div class="test-item ${result.status}">
                        <span class="test-name">${result.name}</span>
                        <span class="test-status">${result.status === 'success' ? '✅' : '❌'}</span>
                        ${result.error ? `<div class="test-error">${result.error}</div>` : ''}
                    </div>
                `).join('')}
            </div>
            <style>
                .test-results h3 { margin-bottom: 15px; }
                .test-item {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    padding: 8px 12px;
                    margin: 4px 0;
                    border-radius: 6px;
                    background: rgba(255,255,255,0.1);
                }
                .test-item.error {
                    background: rgba(255,71,87,0.2);
                }
                .test-item.success {
                    background: rgba(46,213,115,0.2);
                }
                .test-error {
                    font-size: 0.8em;
                    opacity: 0.8;
                    margin-top: 4px;
                    width: 100%;
                }
            </style>
        `;
        
        this.showModal('테스트 결과', content);
    }
    
    async testApiConnection() {
        if (!window.claudeAPI?.isConnected) {
            throw new Error('Claude API가 연결되지 않음');
        }
        return 'API 정상 연결됨';
    }
    
    async testSpeechRecognition() {
        if (!this.app.recognition) {
            throw new Error('음성 인식을 지원하지 않는 브라우저');
        }
        return '음성 인식 지원됨';
    }
    
    async testLocalStorage() {
        try {
            localStorage.setItem('test', 'test');
            localStorage.removeItem('test');
            return '로컬 저장소 정상';
        } catch (error) {
            throw new Error('로컬 저장소 접근 불가');
        }
    }
    
    async testServiceWorker() {
        if (!('serviceWorker' in navigator)) {
            throw new Error('서비스 워커를 지원하지 않는 브라우저');
        }
        
        const registration = await navigator.serviceWorker.getRegistration();
        if (!registration) {
            throw new Error('서비스 워커가 등록되지 않음');
        }
        
        return '서비스 워커 정상 작동';
    }
    
    async testCameraAccess() {
        if (!navigator.mediaDevices?.getUserMedia) {
            throw new Error('카메라 API를 지원하지 않는 브라우저');
        }
        
        // 권한 확인만 (실제 스트림은 생성하지 않음)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            stream.getTracks().forEach(track => track.stop());
            return '카메라 접근 가능';
        } catch (error) {
            throw new Error('카메라 권한이 거부됨');
        }
    }
    
    handleSlowResponse(data) {
        console.warn('⚠️ 느린 응답 감지:', data);
        if (data.duration > 10000) { // 10초 이상
            this.app.showNotification('응답이 지연되고 있습니다...', 'warning');
        }
    }
    
    handleHighUsage(data) {
        console.warn('⚠️ 높은 리소스 사용량:', data);
        if (data.memory > 100 * 1024 * 1024) { // 100MB 이상
            this.app.showNotification('메모리 사용량이 높습니다', 'warning');
        }
    }
    
    loadUserPreferences() {
        try {
            const prefs = localStorage.getItem('userPreferences');
            if (prefs) {
                this.userPreferences = JSON.parse(prefs);
                this.applyUserPreferences();
            }
        } catch (error) {
            console.warn('사용자 설정 로드 실패:', error);
        }
    }
    
    applyUserPreferences() {
        // 사용자 맞춤 설정 적용
        if (this.userPreferences.theme) {
            document.body.className = this.userPreferences.theme;
        }
        
        if (this.userPreferences.fontSize) {
            document.documentElement.style.fontSize = this.userPreferences.fontSize + 'px';
        }
    }
    
    startPerformanceMonitoring() {
        this.performance.start();
        console.log('📊 성능 모니터링 시작');
    }
}

/**
 * 분석 엔진
 */
class AnalyticsEngine {
    constructor() {
        this.data = {
            apiCalls: 0,
            errors: [],
            userActions: [],
            sessionStart: Date.now()
        };
    }
    
    recordApiCall(endpoint, duration, success) {
        this.data.apiCalls++;
        this.data.userActions.push({
            type: 'api_call',
            endpoint,
            duration,
            success,
            timestamp: Date.now()
        });
    }
    
    recordError(error, context) {
        this.data.errors.push({
            message: error.message,
            stack: error.stack,
            context,
            timestamp: Date.now()
        });
    }
    
    recordUserAction(action, data) {
        this.data.userActions.push({
            type: action,
            data,
            timestamp: Date.now()
        });
    }
    
    getApiCallCount() {
        return this.data.apiCalls;
    }
    
    getErrorCount() {
        return this.data.errors.length;
    }
    
    getRecentErrors() {
        return this.data.errors.slice(-10);
    }
    
    getReport() {
        return {
            sessionDuration: Date.now() - this.data.sessionStart,
            totalApiCalls: this.data.apiCalls,
            totalErrors: this.data.errors.length,
            totalActions: this.data.userActions.length,
            errorRate: this.data.errors.length / Math.max(this.data.apiCalls, 1),
            recentActivity: this.data.userActions.slice(-20)
        };
    }
    
    showDashboard() {
        const report = this.getReport();
        const content = `
            <div class="analytics-dashboard">
                <h3>📊 분석 대시보드</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${report.totalApiCalls}</div>
                        <div class="stat-label">API 호출</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${report.totalErrors}</div>
                        <div class="stat-label">오류</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${Math.round(report.sessionDuration / 1000)}s</div>
                        <div class="stat-label">세션 시간</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${Math.round(report.errorRate * 100)}%</div>
                        <div class="stat-label">오류율</div>
                    </div>
                </div>
                <div class="recent-activity">
