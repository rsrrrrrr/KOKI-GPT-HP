/**
 * Koki AI Hub 고급 기능 모듈
 * 분석, 모니터링, 자동화 등의 고급 기능 제공
 */

class AdvancedFeatures {
    constructor(app) {
        this.app = app;
        this.analytics = new AnalyticsEngine();
        this.automation = new AutomationEngine();
        this.performance = new PerformanceMonitor();
        this.templates = new TemplateManager();
        this.plugins = new PluginManager();
        
        this.init();
    }
    
    init() {
        this.setupEventListeners();
        this.loadUserPreferences();
        this.startPerformanceMonitoring();
        console.log('🚀 고급 기능 모듈 초기화 완료');
    }
    
    setupEventListeners() {
        // 키보드 단축키
        document.addEventListener('keydown', this.handleKeyboardShortcuts.bind(this));
        
        // 제스처 감지
        this.setupGestureRecognition();
        
        // 성능 이벤트
        this.performance.on('slowResponse', this.handleSlowResponse.bind(this));
        this.performance.on('highUsage', this.handleHighUsage.bind(this));
    }
    
    handleKeyboardShortcuts(event) {
        const { ctrlKey, altKey, shiftKey, key } = event;
        
        // Ctrl + Enter: 메시지 전송
        if (ctrlKey && key === 'Enter') {
            event.preventDefault();
            this.app.sendMessage();
        }
        
        // Ctrl + K: 빠른 명령
        if (ctrlKey && key === 'k') {
            event.preventDefault();
            this.showQuickCommands();
        }
        
        // Alt + 1-5: 페이지 전환
        if (altKey && /^[1-5]$/.test(key)) {
            event.preventDefault();
            const pages = ['chatPage', 'dualAiPage', 'videoPage', 'toolsPage', 'settingsPage'];
            this.app.switchPage(pages[parseInt(key) - 1]);
        }
        
        // Ctrl + Shift + D: 개발자 모드
        if (ctrlKey && shiftKey && key === 'D') {
            event.preventDefault();
            this.toggleDeveloperMode();
        }
        
        // Ctrl + /: 도움말
        if (ctrlKey && key === '/') {
            event.preventDefault();
            this.showHelp();
        }
    }
    
    setupGestureRecognition() {
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            // 스와이프 감지 (최소 100px 이동)
            if (Math.abs(deltaX) > 100 && Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 0) {
                    this.handleSwipeRight();
                } else {
                    this.handleSwipeLeft();
                }
            }
            
            touchStartX = 0;
            touchStartY = 0;
        });
    }
    
    handleSwipeLeft() {
        // 다음 페이지로 이동
        const pages = ['chatPage', 'dualAiPage', 'videoPage', 'toolsPage', 'settingsPage'];
        const currentIndex = pages.indexOf(this.app.currentPage);
        const nextIndex = (currentIndex + 1) % pages.length;
        this.app.switchPage(pages[nextIndex]);
    }
    
    handleSwipeRight() {
        // 이전 페이지로 이동
        const pages = ['chatPage', 'dualAiPage', 'videoPage', 'toolsPage', 'settingsPage'];
        const currentIndex = pages.indexOf(this.app.currentPage);
        const prevIndex = currentIndex === 0 ? pages.length - 1 : currentIndex - 1;
        this.app.switchPage(pages[prevIndex]);
    }
    
    showQuickCommands() {
        const commands = [
            { key: '/analyze', desc: '대화 내용 분석' },
            { key: '/export', desc: '데이터 내보내기' },
            { key: '/clear', desc: '채팅 지우기' },
            { key: '/stats', desc: '사용 통계' },
            { key: '/help', desc: '도움말' }
        ];
        
        // 빠른 명령 모달 표시
        this.showModal('빠른 명령', this.renderCommandList(commands));
    }
    
    renderCommandList(commands) {
        return `
            <div class="command-list">
                ${commands.map(cmd => `
                    <div class="command-item" onclick="executeCommand('${cmd.key}')">
                        <code>${cmd.key}</code>
                        <span>${cmd.desc}</span>
                    </div>
                `).join('')}
            </div>
            <style>
                .command-list { padding: 10px 0; }
                .command-item {
                    display: flex;
                    justify-content: space-between;
                    padding: 8px 12px;
                    margin: 4px 0;
                    background: rgba(255,255,255,0.1);
                    border-radius: 8px;
                    cursor: pointer;
                    transition: background 0.2s;
                }
                .command-item:hover {
                    background: rgba(255,255,255,0.2);
                }
                .command-item code {
                    color: #2ed573;
                    font-weight: bold;
                }
            </style>
        `;
    }
    
    toggleDeveloperMode() {
        const devMode = !localStorage.getItem('developerMode');
        localStorage.setItem('developerMode', devMode);
        
        if (devMode) {
            this.enableDeveloperMode();
            this.app.showNotification('🔧 개발자 모드 활성화');
        } else {
            this.disableDeveloperMode();
            this.app.showNotification('👤 사용자 모드로 전환');
        }
    }
    
    enableDeveloperMode() {
        // 개발자 도구 추가
        this.addDeveloperPanel();
        
        // 콘솔 로그 레벨 증가
        console.log('🛠️ 개발자 모드 활성화됨');
        
        // 디버그 정보 표시
        this.showDebugInfo();
    }
    
    disableDeveloperMode() {
        // 개발자 패널 제거
        const devPanel = document.getElementById('developer-panel');
        if (devPanel) devPanel.remove();
        
        // 디버그 정보 숨기기
        this.hideDebugInfo();
    }
    
    addDeveloperPanel() {
        const panel = document.createElement('div');
        panel.id = 'developer-panel';
        panel.innerHTML = `
            <div class="dev-panel">
                <h3>🛠️ 개발자 도구</h3>
                <div class="dev-buttons">
                    <button onclick="window.advancedFeatures.performance.showReport()">성능 리포트</button>
                    <button onclick="window.advancedFeatures.analytics.showDashboard()">분석 대시보드</button>
                    <button onclick="window.advancedFeatures.exportDebugData()">디버그 데이터</button>
                    <button onclick="window.advancedFeatures.testAllFeatures()">기능 테스트</button>
                </div>
                <div class="dev-stats" id="dev-stats">
                    <!-- 실시간 통계 -->
                </div>
            </div>
            <style>
                .dev-panel {
                    position: fixed;
                    top: 100px;
                    right: 20px;
                    width: 280px;
                    background: rgba(0,0,0,0.9);
                    border: 1px solid #333;
                    border-radius: 8px;
                    padding: 15px;
                    color: #fff;
                    font-size: 12px;
                    z-index: 9999;
                    backdrop-filter: blur(20px);
                }
                .dev-buttons {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 8px;
                    margin: 10px 0;
                }
                .dev-buttons button {
                    background: #333;
                    border: 1px solid #555;
                    color: #fff;
                    padding: 6px 8px;
                    border-radius: 4px;
                    font-size: 11px;
                    cursor: pointer;
                }
                .dev-buttons button:hover {
                    background: #444;
                }
                .dev-stats {
                    margin-top: 10px;
                    font-family: monospace;
                    font-size: 10px;
                    line-height: 1.4;
                }
            </style>
        `;
        
        document.body.appendChild(panel);
        
        // 실시간 통계 업데이트
        this.updateDevStats();
        setInterval(() => this.updateDevStats(), 1000);
    }
    
    updateDevStats() {
        const statsElement = document.getElementById('dev-stats');
        if (!statsElement) return;
        
        const stats = {
            'Memory': `${Math.round(performance.memory?.usedJSHeapSize / 1024 / 1024) || 'N/A'} MB`,
            'Messages': this.app.chatHistory.length,
            'API Calls': this.analytics.getApiCallCount(),
            'Errors': this.analytics.getErrorCount(),
            'Uptime': this.formatUptime(Date.now() - this.app.startTime)
        };
        
        statsElement.innerHTML = Object.entries(stats)
            .map(([key, value]) => `${key}: ${value}`)
            .join('<br>');
    }
    
    formatUptime(ms) {
        const seconds = Math.floor(ms / 1000);
        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        
        if (hours > 0) return `${hours}h ${minutes % 60}m`;
        if (minutes > 0) return `${minutes}m ${seconds % 60}s`;
        return `${seconds}s`;
    }
    
    showHelp() {
        const helpContent = `
            <div class="help-content">
                <h2>🎯 Koki AI Hub 사용법</h2>
                
                <h3>⌨️ 키보드 단축키</h3>
                <ul>
                    <li><kbd>Ctrl</kbd> + <kbd>Enter</kbd> - 메시지 전송</li>
                    <li><kbd>Ctrl</kbd> + <kbd>K</kbd> - 빠른 명령</li>
                    <li><kbd>Alt</kbd> + <kbd>1-5</kbd> - 페이지 전환</li>
                    <li><kbd>Ctrl</kbd> + <kbd>/</kbd> - 도움말</li>
                </ul>
                
                <h3>📱 제스처</h3>
                <ul>
                    <li>좌우 스와이프 - 페이지 전환</li>
                    <li>길게 누르기 - 상황별 메뉴</li>
                </ul>
                
                <h3>🎤 음성 명령</h3>
                <ul>
                    <li>"새로운 대화" - 채팅 초기화</li>
                    <li>"설정 열어줘" - 설정 페이지로 이동</li>
