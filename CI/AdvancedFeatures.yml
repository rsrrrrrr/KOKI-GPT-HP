/**
 * 성능 모니터
 */
class PerformanceMonitor extends EventTarget {
    constructor() {
        super();
        this.metrics = {
            responseTime: [],
            memoryUsage: [],
            cpuUsage: []
        };
        
        this.thresholds = {
            slowResponse: 5000,    // 5초
            highMemory: 100 * 1024 * 1024  // 100MB
        };
    }
    
    start() {
        // 주기적 모니터링
        setInterval(() => this.collectMetrics(), 5000);
        
        // 응답 시간 모니터링
        this.monitorResponseTime();
    }
    
    collectMetrics() {
        if (performance.memory) {
            const memory = performance.memory.usedJSHeapSize;
            this.metrics.memoryUsage.push({
                value: memory,
                timestamp: Date.now()
            });
            
            // 메모리 임계값 확인
            if (memory > this.thresholds.highMemory) {
                this.dispatchEvent(new CustomEvent('highUsage', {
                    detail: { type: 'memory', value: memory }
                }));
            }
        }
        
        // 오래된 메트릭 정리 (최근 100개만 유지)
        Object.keys(this.metrics).forEach(key => {
            if (this.metrics[key].length > 100) {
                this.metrics[key] = this.metrics[key].slice(-100);
            }
        });
    }
    
    monitorResponseTime() {
        const originalFetch = window.fetch;
        
        window.fetch = async (...args) => {
            const startTime = performance.now();
            
            try {
                const response = await originalFetch(...args);
                const duration = performance.now() - startTime;
                
                this.recordResponseTime(duration);
                
                if (duration > this.thresholds.slowResponse) {
                    this.dispatchEvent(new CustomEvent('slowResponse', {
                        detail: { duration, url: args[0] }
                    }));
                }
                
                return response;
                
            } catch (error) {
                const duration = performance.now() - startTime;
                this.recordResponseTime(duration);
                throw error;
            }
        };
    }
    
    recordResponseTime(duration) {
        this.metrics.responseTime.push({
            value: duration,
            timestamp: Date.now()
        });
    }
    
    getReport() {
        const now = Date.now();
        const lastHour = now - 60 * 60 * 1000;
        
        const recentResponseTimes = this.metrics.responseTime
            .filter(m => m.timestamp > lastHour)
            .map(m => m.value);
        
        const avgResponseTime = recentResponseTimes.length > 0
            ? recentResponseTimes.reduce((a, b) => a + b, 0) / recentResponseTimes.length
            : 0;
        
        return {
            averageResponseTime: Math.round(avgResponseTime),
            totalRequests: this.metrics.responseTime.length,
            slowRequests: recentResponseTimes.filter(t => t > this.thresholds.slowResponse).length,
            currentMemory: performance.memory ? Math.round(performance.memory.usedJSHeapSize / 1024 / 1024) : 'N/A'
        };
    }
    
    showReport() {
        const report = this.getReport();
        const content = `
            <div class="performance-report">
                <h3>⚡ 성능 리포트</h3>
                <div class="perf-stats">
                    <div class="perf-item">
                        <label>평균 응답 시간:</label>
                        <span>${report.averageResponseTime}ms</span>
                    </div>
                    <div class="perf-item">
                        <label>총 요청 수:</label>
                        <span>${report.totalRequests}</span>
                    </div>
                    <div class="perf-item">
                        <label>느린 요청:</label>
                        <span>${report.slowRequests}</span>
                    </div>
                    <div class="perf-item">
                        <label>현재 메모리:</label>
                        <span>${report.currentMemory}MB</span>
                    </div>
                </div>
                <div class="perf-chart" id="perf-chart">
                    <!-- 간단한 차트 표시 -->
                </div>
            </div>
            <style>
                .performance-report h3 { margin-bottom: 20px; }
                .perf-stats { margin-bottom: 20px; }
                .perf-item {
                    display: flex;
                    justify-content: space-between;
                    padding: 8px 0;
                    border-bottom: 1px solid rgba(255,255,255,0.1);
                }
                .perf-item label { font-weight: 500; }
                .perf-item span { color: #2ed573; }
                .perf-chart {
                    height: 100px;
                    background: rgba(0,0,0,0.2);
                    border-radius: 8px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: rgba(255,255,255,0.6);
                }
            </style>
        `;
        
        window.advancedFeatures.showModal('성능 리포트', content);
    }
}

/**
 * 자동화 엔진
 */
class AutomationEngine {
    constructor() {
        this.rules = [];
        this.triggers = new Map();
    }
    
    addRule(name, trigger, action) {
        const rule = {
            id: Date.now(),
            name,
            trigger,
            action,
            enabled: true,
            lastExecuted: null
        };
        
        this.rules.push(rule);
        this.setupTrigger(rule);
        
        return rule.id;
    }
    
    setupTrigger(rule) {
        switch (rule.trigger.type) {
            case 'time':
                this.setupTimeTrigger(rule);
                break;
            case 'event':
                this.setupEventTrigger(rule);
                break;
            case 'condition':
                this.setupConditionTrigger(rule);
                break;
        }
    }
    
    setupTimeTrigger(rule) {
        const { interval } = rule.trigger;
        const intervalId = setInterval(() => {
            if (rule.enabled) {
                this.executeAction(rule);
            }
        }, interval);
        
        this.triggers.set(rule.id, intervalId);
    }
    
    setupEventTrigger(rule) {
        const { event, element } = rule.trigger;
        const handler = () => {
            if (rule.enabled) {
                this.executeAction(rule);
            }
        };
        
        const target = element || document;
        target.addEventListener(event, handler);
        
        this.triggers.set(rule.id, { target, event, handler });
    }
    
    executeAction(rule) {
        try {
            rule.action();
            rule.lastExecuted = Date.now();
            console.log(`🤖 자동화 규칙 실행: ${rule.name}`);
            
        } catch (error) {
            console.error(`❌ 자동화 규칙 실행 실패: ${rule.name}`, error);
        }
    }
}

/**
 * 템플릿 매니저
 */
class TemplateManager {
    constructor() {
        this.templates = new Map();
        this.loadDefaultTemplates();
    }
    
    loadDefaultTemplates() {
        const defaults = [
            {
                id: 'email-formal',
                name: '공식 이메일',
                category: 'email',
                content: '안녕하세요.\n\n{content}\n\n감사합니다.\n{name} 드림'
            },
            {
                id: 'email-casual',
                name: '일반 이메일', 
                category: 'email',
                content: '안녕하세요!\n\n{content}\n\n좋은 하루 되세요 :)'
            },
            {
                id: 'report-basic',
                name: '기본 보고서',
                category: 'report',
                content: '# {title}\n\n## 개요\n{overview}\n\n## 상세 내용\n{details}\n\n## 결론\n{conclusion}'
            }
        ];
        
        defaults.forEach(template => {
            this.templates.set(template.id, template);
        });
    }
    
    getTemplate(id) {
        return this.templates.get(id);
    }
    
    getAllTemplates() {
        return Array.from(this.templates.values());
    }
    
    addTemplate(template) {
        const id = template.id || `template-${Date.now()}`;
        this.templates.set(id, { ...template, id });
        return id;
    }
    
    fillTemplate(id, variables) {
        const template = this.getTemplate(id);
        if (!template) return null;
        
        let content = template.content;
        
        Object.entries(variables).forEach(([key, value]) => {
            content = content.replace(new RegExp(`{${key}}`, 'g'), value);
        });
        
        return content;
    }
}

/**
 * 플러그인 매니저
 */
class PluginManager {
    constructor() {
        this.plugins = new Map();
        this.hooks = new Map();
    }
    
    registerPlugin(plugin) {
        if (!plugin.id || !plugin.name) {
            throw new Error('플러그인에는 id와 name이 필요합니다');
        }
        
        this.plugins.set(plugin.id, plugin);
        
        // 플러그인 초기화
        if (plugin.init) {
            plugin.init();
        }
        
        console.log(`🔌 플러그인 등록됨: ${plugin.name}`);
    }
    
    getPlugin(id) {
        return this.plugins.get(id);
    }
    
    addHook(name, callback) {
        if (!this.hooks.has(name)) {
            this.hooks.set(name, []);
        }
        
        this.hooks.get(name).push(callback);
    }
    
    executeHook(name, data) {
        const callbacks = this.hooks.get(name) || [];
        
        callbacks.forEach(callback => {
            try {
                callback(data);
            } catch (error) {
                console.error(`❌ 훅 실행 실패 (${name}):`, error);
            }
        });
    }
}

// 전역 함수들
window.executeCommand = function(command) {
    switch (command) {
        case '/analyze':
            window.advancedFeatures.analytics.showDashboard();
            break;
        case '/export':
            window.advancedFeatures.exportDebugData();
            break;
        case '/clear':
            if (confirm('채팅 내역을 모두 삭제하시겠습니까?')) {
                window.kokiApp.chatHistory = [];
                document.getElementById('messages').innerHTML = '';
                window.kokiApp.showNotification('💬 채팅 내역이 삭제되었습니다');
            }
            break;
        case '/stats':
            window.advancedFeatures.performance.showReport();
            break;
        case '/help':
            window.advancedFeatures.showHelp();
            break;
        default:
            window.kokiApp.showNotification('알 수 없는 명령입니다', 'error');
    }
    
    // 모달 닫기
    const modal = document.getElementById('advanced-modal');
    if (modal) modal.remove();
};

